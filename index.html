<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Examen Taller II</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/main.css">
</head>
<body>
    <div class="main-container">
    <form class="formulario-registro" id="formRegistro">
        <h2>Registro de Personal</h2>

        <div class="input-group">
            <label>Identificación:</label>
            <input type="number" id="id_usuario">
            <div id="logId"></div>
        </div>

        <div class="input-group">
            <label>Nombre:</label>
            <input type="text" id="nombre">
            <div id="logNombre"></div>
        </div>

        <div class="input-group">
            <label>Apellido:</label>
            <input type="text" id="apellido">
            <div id="logApellido"></div>
        </div>

        <div class="input-group">
            <label>Género:</label>
            <!-- FALLA: Falta ID para capturarlo en JS y valores en los options -->
            <select id="genero">
                <option value="">Seleccione...</option>
                <option value="M">Masculino</option>
                <option value="F">Femenino</option>
                <option value="O">Otros</option>
            </select>
            <div id="logGenero"></div>
        </div>

        <button type="submit" id="btn-registrar">Registrar</button>
    </form>

    <div id="lista-usuarios">
        <!-- Aquí deben aparecer los datos después de dar clic -->
    </div>
    
    </div>
    <!-- FALLA: Falta el script de JS o está mal referenciado -->
     <script src="./js/app.js"></script>
</body>
</html>
